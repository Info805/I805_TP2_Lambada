#       junit: build/test-results/**/TEST-*.xml
#       coverage_report:
#         coverage_format: jacoco
#         path: build/reports/jacoco/**/*.xml

build:java8:
  extends: .build
  image: eclipse-temurin:8-jdk
  allow_failure: true

build:java11:
  extends: .build
  image: eclipse-temurin:11.0.29_7-jdk
  allow_failure: true

build:java17:
  extends: .build
  image: eclipse-temurin:17.0.17_10-jdk

build:java21:
  extends: .build
  image: eclipse-temurin:21.0.9_10-jdk

build:java25:
  extends: .build
  image: eclipse-temurin:25.0.1_8-jdk
